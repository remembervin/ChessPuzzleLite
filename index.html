<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobo Chess Puzzle Studio</title>

<style>
body{
  max-width:760px;
  margin:0 auto;
  padding:4px;
  font-family:sans-serif;
  text-align:center;
  background:#fff;
  color:#000;
}

h2{
  margin:6px 0;
  font-size:22px;
}

#info{
  min-height:24px;
  margin:6px 0;
  font-size:16px;
}

#board table{
  border-collapse:collapse;
  margin:0 auto;
  border:2px solid #000;
}

#board td{
  width:42px;
  height:42px;
  padding:0;
  text-align:center;
  vertical-align:middle;
  border:1px solid #666;
  cursor:pointer;
}

.light{ background:#eee; }
.dark{ background:#aaa; }

.selected{
  outline:2px solid #111;
}

.move{
  box-shadow: inset 0 0 0 1px #444;
}

.capture{
  outline:2px solid #000;
}

.lastfrom{
  box-shadow: inset 0 0 0 2px #666;
}

.lastto{
  box-shadow: inset 0 0 0 2px #111;
}

.checking{
  outline:2px dotted #000;
}

.mate{
  box-shadow: inset 0 0 8px 3px #000;
}

button, input, select{
  font-size:15px;
  margin:3px;
}

#promotion{
  display:none;
  margin:8px 0;
}

#setupPanel{
  margin:10px 0;
  padding:6px;
  border:1px solid #999;
}

#playPanel{
  margin:10px 0;
  padding:6px;
  border:1px solid #999;
  display:none;
}

#pgnPanel{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #aaa;
}

#pgnInput{
  width:90%;
}
</style>
</head>

<body>

<h2>Kobo Chess Puzzle Studio</h2>

<div id="info">Setup Mode</div>

<div id="board"></div>

<div id="promotion"></div>

<div id="setupPanel">

  <div><b>Setup</b></div>

  <div>
    <button onclick="selectPiece('K')">WK</button>
    <button onclick="selectPiece('Q')">WQ</button>
    <button onclick="selectPiece('R')">WR</button>
    <button onclick="selectPiece('B')">WB</button>
    <button onclick="selectPiece('N')">WN</button>
    <button onclick="selectPiece('P')">WP</button>
  </div>

  <div>
    <button onclick="selectPiece('k')">BK</button>
    <button onclick="selectPiece('q')">BQ</button>
    <button onclick="selectPiece('r')">BR</button>
    <button onclick="selectPiece('b')">BB</button>
    <button onclick="selectPiece('n')">BN</button>
    <button onclick="selectPiece('p')">BP</button>
  </div>

  <div>
    <button onclick="clearSquareMode()">Clear Square</button>
    <button onclick="clearBoard()">Clear Board</button>
  </div>

  <div>
    <button onclick="setTurn('white')">White To Play</button>
    <button onclick="setTurn('black')">Black To Play</button>
  </div>

  <div>
    <button onclick="doneSetup()">GO</button>
  </div>

</div>

<div id="playPanel">

  <div><b>Puzzle Controls</b></div>

  <button onclick="prevMove()">◀ Prev</button>
  <button onclick="nextMove()">Next ▶</button>
  <button onclick="resetPuzzle()">Reset</button>
  <button onclick="startSolutionMode()">💡 Solution</button>
  <button onclick="flipBoard()">Flip</button>
  <button onclick="backToSetup()">Edit</button>

</div>

<div id="pgnPanel">
  <div><b>PGN Import</b></div>
  <input id="pgnInput" type="text" placeholder="Paste Lichess PGN here">
  <br>
  <button onclick="loadPGN()">Load PGN Puzzle</button>
</div>

<script>

var pieces = {

R:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><rect x="16" y="12" width="8" height="6"/><rect x="26" y="12" width="8" height="6"/><rect x="36" y="12" width="8" height="6"/><rect x="16" y="18" width="28" height="6"/><rect x="20" y="24" width="20" height="22"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

r:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><rect x="16" y="12" width="8" height="6"/><rect x="26" y="12" width="8" height="6"/><rect x="36" y="12" width="8" height="6"/><rect x="16" y="18" width="28" height="6"/><rect x="20" y="24" width="20" height="22"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

B:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><path d="M30 6 L34 11 C38 15,38 22,34 27 L36 31 L24 31 L26 27 C22 22,22 15,26 11 Z"/><line x1="27" y1="14" x2="33" y2="22"/><path d="M22 33 L38 33 L42 47 L18 47 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

N:'<svg viewBox="0 0 60 60" width="32" height="32"><g transform="translate(6,7) scale(1.48)" fill="white" stroke="black" stroke-width="1.15"><path d="M21.595 24.502c-0.562-0.617-0.354-2.674-0.354-2.674s1.107-4.826 1.711-5.932c0.604-1.105 0.62-4.278 0.62-4.278s-0.118-1.963-0.974-4.384c-0.856-2.42-3.852-4.44-5.872-4.766C16.519 1.333 14.734 0 14.734 0s0.295 2.439-0.03 2.483c-0.325 0.044-1.682 0.443-1.682 0.443l0.31 1.003c-1.756 0.518-2.458 1.019-2.458 1.019s-0.05 0.089-0.375 0.753S6.294 9.463 6.111 9.67c-0.183 0.207-0.078 0.604-0.078 0.604s-0.062 0.812-0.106 0.856c-0.044 0.045-0.163 0.664 0.051 0.93c0.214 0.267 0.376 0.59 0.803 0.944c0.428 0.354 0.546 0.118 0.546 0.118s0.036 0.135 1.225 0.321c1.461 0.013 1.962-1.059 1.962-1.059s0.428-0.752 1.564-0.531c2.272 1.181 3.815 0.292 3.815 0.292s-1.849 1.532-4.603 5.564c-2.754 4.031-0.787 6.791-0.787 6.791z"/><rect x="6.5" y="27.2" width="18.5" height="4.2"/></g></svg>',

n:'<svg viewBox="0 0 60 60" width="32" height="32"><g transform="translate(6,7) scale(1.48)" fill="black" stroke="black" stroke-width="1.15"><path d="M21.595 24.502c-0.562-0.617-0.354-2.674-0.354-2.674s1.107-4.826 1.711-5.932c0.604-1.105 0.62-4.278 0.62-4.278s-0.118-1.963-0.974-4.384c-0.856-2.42-3.852-4.44-5.872-4.766C16.519 1.333 14.734 0 14.734 0s0.295 2.439-0.03 2.483c-0.325 0.044-1.682 0.443-1.682 0.443l0.31 1.003c-1.756 0.518-2.458 1.019-2.458 1.019s-0.05 0.089-0.375 0.753S6.294 9.463 6.111 9.67c-0.183 0.207-0.078 0.604-0.078 0.604s-0.062 0.812-0.106 0.856c-0.044 0.045-0.163 0.664 0.051 0.93c0.214 0.267 0.376 0.59 0.803 0.944c0.428 0.354 0.546 0.118 0.546 0.118s0.036 0.135 1.225 0.321c1.461 0.013 1.962-1.059 1.962-1.059s0.428-0.752 1.564-0.531c2.272 1.181 3.815 0.292 3.815 0.292s-1.849 1.532-4.603 5.564c-2.754 4.031-0.787 6.791-0.787 6.791z"/><rect x="6.5" y="27.2" width="18.5" height="4.2"/></g></svg>',

P:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><circle cx="30" cy="15" r="7"/><path d="M24 24 L36 24 L38 29 L36 33 L40 46 L20 46 L24 33 L22 29 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

p:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><circle cx="30" cy="15" r="7"/><path d="M24 24 L36 24 L38 29 L36 33 L40 46 L20 46 L24 33 L22 29 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>'

};

var board = [];
var selected = null;
var selectedPiece = '';
var setupMode = true;
var turn = 'white';
var flipped = false;

var initialBoard = null;
var initialTurn = 'white';

var solutionMoves = [];
var solutionIndex = 0;
var solutionMode = false;

var moveHistory = [];
var historyIndex = -1;

var lastMove = null;

function cloneBoard(b){
  return JSON.parse(JSON.stringify(b));
}

function initEmptyBoard(){
  board = [];
  for(var r=0;r<8;r++){
    board[r] = [];
    for(var c=0;c<8;c++){
      board[r][c] = '';
    }
  }
}

function selectPiece(p){
  selectedPiece = p;
}

function clearSquareMode(){
  selectedPiece = '';
}

function setTurn(t){
  turn = t;
  document.getElementById('info').innerHTML =
    'Setup Mode (' + t + ' to move)';
}

function clearBoard(){
  initEmptyBoard();
  drawBoard();
}

function doneSetup(){
  setupMode = false;
  initialBoard = cloneBoard(board);
  initialTurn = turn;
  moveHistory = [];
  historyIndex = -1;
  solutionIndex = 0;
  solutionMode = false;

  document.getElementById('setupPanel').style.display='none';
  document.getElementById('playPanel').style.display='block';
  document.getElementById('info').innerHTML='Puzzle Ready';

  drawBoard();
}

function backToSetup(){
  setupMode = true;
  solutionMode = false;

  document.getElementById('setupPanel').style.display='block';
  document.getElementById('playPanel').style.display='none';
  document.getElementById('info').innerHTML='Setup Mode';

  drawBoard();
}

function flipBoard(){
  flipped = !flipped;
  drawBoard();
}

function drawBoard(){

  var boardDiv = document.getElementById('board');
  boardDiv.innerHTML = '';

  var tbl = document.createElement('table');

  for(var r=0;r<8;r++){

    var tr = document.createElement('tr');

    for(var c=0;c<8;c++){

      var rr = flipped ? 7-r : r;
      var cc = flipped ? 7-c : c;

      var td = document.createElement('td');
      td.className = ((rr+cc)%2) ? 'dark' : 'light';

      if(lastMove){
        if(lastMove.from.r===rr && lastMove.from.c===cc){
          td.className += ' lastfrom';
        }
        if(lastMove.to.r===rr && lastMove.to.c===cc){
          td.className += ' lastto';
        }
      }

      if(selected &&
         selected.r===rr &&
         selected.c===cc){
        td.className += ' selected';
      }

      if(board[rr][cc]){
        td.innerHTML = pieces[board[rr][cc]];
      }

      (function(x,y){
        td.onclick = function(){
          handleSquareClick(x,y);
        };
      })(rr,cc);

      tr.appendChild(td);
    }

    tbl.appendChild(tr);
  }

  boardDiv.appendChild(tbl);
}

function isWhitePiece(p){
  return p && p===p.toUpperCase();
}

function isOwnTurnPiece(p){
  if(turn==='white') return isWhitePiece(p);
  return p && !isWhitePiece(p);
}

function sign(x){
  return x>0 ? 1 : x<0 ? -1 : 0;
}

function clearPath(from,to){

  var dr = sign(to.r-from.r);
  var dc = sign(to.c-from.c);

  var r = from.r + dr;
  var c = from.c + dc;

  while(r!==to.r || c!==to.c){
    if(board[r][c]) return false;
    r += dr;
    c += dc;
  }

  return true;
}

function isBasicLegalMove(from,to,piece){

  var target = board[to.r][to.c];

  if(target && isWhitePiece(target)===isWhitePiece(piece)){
    return false;
  }

  var dr = to.r-from.r;
  var dc = to.c-from.c;

  switch(piece.toLowerCase()){

    case 'p':
      var dir = piece==='P' ? -1 : 1;

      if(dc===0 && !target && dr===dir) return true;

      if(dc===0 && !target && dr===2*dir){
        if(piece==='P' && from.r===6 && !board[5][from.c]) return true;
        if(piece==='p' && from.r===1 && !board[2][from.c]) return true;
      }

      if(Math.abs(dc)===1 && target && dr===dir){
        return true;
      }

      return false;

    case 'n':
      return (
        (Math.abs(dr)===2 && Math.abs(dc)===1) ||
        (Math.abs(dr)===1 && Math.abs(dc)===2)
      );

    case 'b':
      return Math.abs(dr)===Math.abs(dc) && clearPath(from,to);

    case 'r':
      return (dr===0 || dc===0) && clearPath(from,to);

    case 'q':
      return (
        ((dr===0 || dc===0) || Math.abs(dr)===Math.abs(dc)) &&
        clearPath(from,to)
      );

    case 'k':
      return Math.abs(dr)<=1 && Math.abs(dc)<=1;
  }

  return false;
}

function handleSquareClick(r,c){

  if(setupMode){
    board[r][c] = selectedPiece;
    drawBoard();
    return;
  }

  if(solutionMode){
    playSolutionMove();
    return;
  }

  var piece = board[r][c];

  if(!selected){
    if(piece && isOwnTurnPiece(piece)){
      selected = {r:r,c:c};
      drawBoard();
    }
    return;
  }

  if(selected.r===r && selected.c===c){
    selected = null;
    drawBoard();
    return;
  }

  if(isBasicLegalMove(selected,{r:r,c:c},board[selected.r][selected.c])){
    executeMove(selected,{r:r,c:c});
  }

  selected = null;
  drawBoard();
}

function executeMove(from,to){

  moveHistory.push({
    board: cloneBoard(board),
    turn: turn
  });

  historyIndex++;

  var piece = board[from.r][from.c];

  board[to.r][to.c] = piece;
  board[from.r][from.c] = '';

  lastMove = {
    from: cloneBoard(from),
    to: cloneBoard(to)
  };

  turn = turn==='white' ? 'black' : 'white';
}

function prevMove(){

  if(historyIndex<0) return;

  var h = moveHistory[historyIndex];

  board = cloneBoard(h.board);
  turn = h.turn;

  historyIndex--;

  drawBoard();
}

function nextMove(){

  if(solutionIndex>=solutionMoves.length) return;

  executeMove(
    solutionMoves[solutionIndex].from,
    solutionMoves[solutionIndex].to
  );

  solutionIndex++;
  drawBoard();
}

function resetPuzzle(){

  if(!initialBoard) return;

  board = cloneBoard(initialBoard);
  turn = initialTurn;
  selected = null;
  solutionMode = false;
  solutionIndex = 0;
  moveHistory = [];
  historyIndex = -1;
  lastMove = null;

  drawBoard();
}

function startSolutionMode(){
  solutionMode = true;
  document.getElementById('info').innerHTML='Solution Mode';
}

function playSolutionMove(){

  if(solutionIndex>=solutionMoves.length){
    solutionMode = false;
    document.getElementById('info').innerHTML='Solution Complete';
    return;
  }

  nextMove();
}

function parseSquare(s){
  return {
    c: s.charCodeAt(0)-97,
    r: 8-parseInt(s.charAt(1),10)
  };
}

function standardSetup(){

  board = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];

  turn='white';
}

function parseSAN(san){

  san = san.replace(/[+#?!]/g,'');

  if(san==='O-O' || san==='O-O-O'){
    return null;
  }

  var target = san.slice(-2);

  if(!/^[a-h][1-8]$/.test(target)){
    return null;
  }

  var to = parseSquare(target);

  var pieceType = 'P';

  if(/[KQRBN]/.test(san.charAt(0))){
    pieceType = san.charAt(0);
  }

  for(var r=0;r<8;r++){
    for(var c=0;c<8;c++){

      var p = board[r][c];
      if(!p) continue;

      if(turn==='white'){
        if(p!==pieceType) continue;
      } else {
        if(p!==pieceType.toLowerCase()) continue;
      }

      if(isBasicLegalMove({r:r,c:c},to,p)){
        return {
          from:{r:r,c:c},
          to:to
        };
      }
    }
  }

  return null;
}

function loadPGN(){

  var txt = document.getElementById('pgnInput').value;

  if(!txt){
    document.getElementById('info').innerHTML='Paste PGN first';
    return;
  }

  txt = txt.replace(/\[[^\]]*\]/g,'');
  txt = txt.replace(/\{[^}]*\}/g,'');
  txt = txt.replace(/\([^)]*\)/g,'');
  txt = txt.replace(/\d+\./g,'');
  txt = txt.replace(/1-0|0-1|1\/2-1\/2|\*/g,'');

  var toks = txt.split(/\s+/);

  standardSetup();

  solutionMoves = [];
  solutionIndex = 0;

  for(var i=0;i<toks.length;i++){

    var san = toks[i];
    if(!san) continue;

    var mv = parseSAN(san);

    if(mv){
      solutionMoves.push(mv);
      board[mv.to.r][mv.to.c] = board[mv.from.r][mv.from.c];
      board[mv.from.r][mv.from.c] = '';
      turn = turn==='white' ? 'black' : 'white';
    }
  }

  standardSetup();

  initialBoard = cloneBoard(board);
  initialTurn = 'white';
  setupMode = false;
  selected = null;
  moveHistory = [];
  historyIndex = -1;
  lastMove = null;

  document.getElementById('setupPanel').style.display='none';
  document.getElementById('playPanel').style.display='block';
  document.getElementById('info').innerHTML =
    'PGN Loaded (' + solutionMoves.length + ' moves)';

  drawBoard();
}

initEmptyBoard();
drawBoard();

</script>
</body>
</html>
