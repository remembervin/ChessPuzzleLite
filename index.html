<style>
body{
  max-width:760px;
  margin:0 auto;
  padding:6px;
  font-family:sans-serif;
  text-align:center;
  background:#fff;
  color:#000;
}

h2{
  margin:6px 0;
  font-size:22px;
}

#status{
  font-size:16px;
  margin:8px 0;
  min-height:22px;
}

#board table{
  border-collapse:collapse;
  margin:0 auto;
  border:2px solid #000;
}

#board td{
  width:42px;
  height:42px;
  border:1px solid #666;
  text-align:center;
  vertical-align:middle;
  padding:0;
  cursor:pointer;
}

.light{ background:#eee; }
.dark{ background:#aaa; }

.selected{
  outline:2px solid #222;
}

.move{
  box-shadow: inset 0 0 0 1px #444;
}

.lastfrom{
  box-shadow: inset 0 0 0 2px #666;
}

.lastto{
  box-shadow: inset 0 0 0 2px #222;
}

.checking{
  outline:2px dotted #000;
}

.mate{
  box-shadow: inset 0 0 8px 3px #000;
}

textarea{
  width:95%;
  height:110px;
  font-size:14px;
  margin:8px 0;
}

button, select{
  font-size:15px;
  padding:6px 8px;
  margin:3px;
}

#editorPanel{
  margin:10px 0;
  padding:6px;
  border:1px solid #888;
}

#replayPanel{
  margin:10px 0;
  padding:6px;
  border:1px solid #888;
}

#promotion{
  display:none;
  margin:10px;
}
</style>
</head>

var board;
var selected = null;
var flipped = false;
var editorMode = false;
var solveMode = false;
var turn = 'white';
var enPassant = null;
var moved = {};
var pendingPromotion = null;

var puzzleMoves = [];
var currentStep = 0;
var puzzleStartBoard = null;

var lastMove = null;
var checkingPieceSquare = null;
var checkmateSquare = null;

function cloneBoard(b){
  return JSON.parse(JSON.stringify(b));
}

function sign(x){
  return x>0 ? 1 : x<0 ? -1 : 0;
}

function setStatus(msg){
  document.getElementById('status').innerHTML = msg;
}

function standardSetup(){
  board = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];

  turn = document.getElementById('sideToMove').value;
  moved = {};
  enPassant = null;
  selected = null;
  lastMove = null;

  draw();
}

function clearBoard(){
  board = [];
  for(var r=0;r<8;r++){
    board[r] = [];
    for(var c=0;c<8;c++){
      board[r][c] = '';
    }
  }
  draw();
}

function enableEditor(){
  editorMode = !editorMode;
  setStatus(editorMode ? 'Editor mode ON' : 'Editor mode OFF');
}

function flipBoard(){
  flipped = !flipped;
  draw();
}

function draw(){

  var el = document.getElementById('board');
  el.innerHTML = '';

  var tbl = document.createElement('table');

  for(var r=0;r<8;r++){

    var tr = document.createElement('tr');

    for(var c=0;c<8;c++){

      var rr = flipped ? 7-r : r;
      var cc = flipped ? 7-c : c;

      var td = document.createElement('td');
      td.className = ((rr+cc)%2) ? 'dark' : 'light';

      if(lastMove){
        if(lastMove.from.r===rr && lastMove.from.c===cc){
          td.className += ' lastfrom';
        }
        if(lastMove.to.r===rr && lastMove.to.c===cc){
          td.className += ' lastto';
        }
      }

      if(selected &&
         selected.r===rr &&
         selected.c===cc){
        td.className += ' selected';
      }

      if(board[rr][cc]){
        td.innerHTML = pieces[board[rr][cc]];
      }

      (function(x,y){
        td.onclick = function(){
          handleTap(x,y);
        };
      })(rr,cc);

      tr.appendChild(td);
    }

    tbl.appendChild(tr);
  }

  el.appendChild(tbl);
}
  function isWhitePiece(p){
  return p && p===p.toUpperCase();
}

function isOwnPiece(p){
  if(turn==='white') return isWhitePiece(p);
  return p && !isWhitePiece(p);
}

function handleTap(r,c){

  if(editorMode){
    var pick = document.getElementById('piecePicker').value;
    board[r][c] = pick;
    draw();
    return;
  }

  if(solveMode){
    handleSolveTap(r,c);
    return;
  }
}

function handleSolveTap(r,c){

  var piece = board[r][c];

  if(!selected){
    if(piece && isOwnPiece(piece)){
      selected = {r:r,c:c};
      draw();
    }
    return;
  }

  if(selected.r===r && selected.c===c){
    selected = null;
    draw();
    return;
  }

  var expected = puzzleMoves[currentStep];
  if(!expected){
    setStatus('Puzzle complete');
    selected = null;
    return;
  }

  if(expected.from.r===selected.r &&
     expected.from.c===selected.c &&
     expected.to.r===r &&
     expected.to.c===c){

    makeMove(expected.from,expected.to);
    currentStep++;
    turn = turn==='white' ? 'black' : 'white';
    setStatus('Correct');
  }
  else{
    setStatus('Wrong move');
  }

  selected = null;
  draw();
}

function makeMove(from,to){

  var piece = board[from.r][from.c];

  board[to.r][to.c] = piece;
  board[from.r][from.c] = '';

  lastMove = {
    from:{r:from.r,c:from.c},
    to:{r:to.r,c:to.c}
  };
}

function restartPuzzle(){
  if(!puzzleStartBoard) return;
  board = cloneBoard(puzzleStartBoard);
  currentStep = 0;
  selected = null;
  draw();
  setStatus('Puzzle restarted');
}

function nextMove(){

  if(currentStep >= puzzleMoves.length){
    setStatus('End of line');
    return;
  }

  var mv = puzzleMoves[currentStep];
  makeMove(mv.from,mv.to);
  currentStep++;
  turn = turn==='white' ? 'black' : 'white';
  draw();
}

function prevMove(){
  if(!puzzleStartBoard) return;

  board = cloneBoard(puzzleStartBoard);
  currentStep--;

  if(currentStep<0) currentStep=0;

  var i;
  for(i=0;i<currentStep;i++){
    makeMove(puzzleMoves[i].from,puzzleMoves[i].to);
  }

  draw();
}

function toggleSolveMode(){
  solveMode = !solveMode;
  selected = null;
  setStatus(solveMode ? 'Solve mode ON' : 'Solve mode OFF');
  draw();
}

standardSetup();

puzzleMoves = [];
currentStep = 0;

var originalBoard = cloneBoard(board);
var originalTurn = turn;

var i;
for(i=0;i<toks.length;i++){

  var san = toks[i];
  if(!san) continue;

  var mv = parseSAN(san);

  if(mv){
    puzzleMoves.push(mv);
    makeMove(mv.from,mv.to);
    turn = turn==='white' ? 'black' : 'white';
  }
}

puzzleStartBoard = cloneBoard(originalBoard);

board = cloneBoard(puzzleStartBoard);
turn = originalTurn;
currentStep = 0;
selected = null;
lastMove = null;

  draw();

  setStatus('PGN loaded: ' + puzzleMoves.length + ' moves');
}

function parseSAN(san){

  san = san.replace(/[+#?!]/g,'');

  if(san==='O-O' || san==='O-O-O'){
    return null;
  }

  var target = san.slice(-2);

  if(!/^[a-h][1-8]$/.test(target)){
    return null;
  }

  var tc = target.charCodeAt(0)-97;
  var tr = 8-parseInt(target.charAt(1),10);

  var pieceType = 'P';
  var first = san.charAt(0);

  if(/[KQRBN]/.test(first)){
    pieceType = first;
  }

  var r,c,p;

  for(r=0;r<8;r++){
    for(c=0;c<8;c++){

      p = board[r][c];
      if(!p) continue;

      if(turn==='white'){
        if(p!==pieceType) continue;
      } else {
        if(p!==pieceType.toLowerCase()) continue;
      }

      if(canReach({r:r,c:c},{r:tr,c:tc},p)){
        return {
          from:{r:r,c:c},
          to:{r:tr,c:tc}
        };
      }
    }
  }

  return null;
}

function canReach(from,to,piece){

  var dr = to.r-from.r;
  var dc = to.c-from.c;

  switch(piece.toLowerCase()){

    case 'p':
      var dir = piece==='P' ? -1 : 1;

      if(dc===0 && dr===dir && !board[to.r][to.c]){
        return true;
      }

      if(Math.abs(dc)===1 && dr===dir){
        return true;
      }

      return false;

    case 'n':
      return (
        (Math.abs(dr)===2 && Math.abs(dc)===1) ||
        (Math.abs(dr)===1 && Math.abs(dc)===2)
      );

    case 'b':
      return Math.abs(dr)===Math.abs(dc);

    case 'r':
      return dr===0 || dc===0;

    case 'q':
      return (
        dr===0 ||
        dc===0 ||
        Math.abs(dr)===Math.abs(dc)
      );

    case 'k':
      return Math.abs(dr)<=1 && Math.abs(dc)<=1;
  }

  return false;
}
