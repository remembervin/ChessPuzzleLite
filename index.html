<style>
body {
  max-width: 720px;
  margin: 0 auto;
  padding: 5px;
  font-family: sans-serif;
  text-align: center;
  background: #fff;
  color: #000;
}

h2 {
  margin: 8px 0;
}

#info {
  font-size: 18px;
  margin: 8px;
  min-height: 24px;
}

#board {
  margin: 10px auto;
}

#board table {
  border-collapse: collapse;
  margin: 0 auto;
  border: 2px solid #000;
}

#board td {
  width: 42px;
  height: 42px;
  text-align: center;
  vertical-align: middle;
  font-size: 0;
  border: 1px solid #666;
  cursor: pointer;
  padding: 0;
}

#board img {
  width: 30px;
  height: 30px;
  display: block;
  margin: auto;
}

.light {
  background: #eee;
}

.dark {
  background: #aaa;
}

.selected {
  outline: 2px solid #222;
}

.move {
  box-shadow: inset 0 0 0 1px #444;
}

.lastfrom {
  box-shadow: inset 0 0 0 2px #666;
}

.lastto {
  box-shadow: inset 0 0 0 2px #222;
}

.checking {
  outline: 3px dotted #000;
}

.mate {
  box-shadow: inset 0 0 10px 4px #000;
}

.whitePiece {
  font-weight: normal;
  text-shadow: 0 0 1px #000;
}

.blackPiece {
  font-weight: bold;
}

.controls {
  margin: 10px;
}

.controls button {
  font-size: 16px;
  padding: 6px 10px;
  margin: 4px;
}

input {
  width: 85%;
  font-size: 14px;
  padding: 4px;
}
</style>
</head>

var flipped = false;

var setupMode = true;
var selectedPiece = '';

var initialBoard = null;
var initialTurn = 'white';

var puzzleGoal = '';
var solutionMoves = [];
var solutionIndex = 0;
var solutionMode = false;
var puzzleCompleted = false;

var moveHistory = [];
var historyIndex = 0;

var lastMove = null;
var checkmateSquare = null;
var checkingPieceSquare = null;

function cloneBoard(src) {
  return JSON.parse(JSON.stringify(src));
}

function initEmptyBoard() {
  board = [];
  var r, c, row;

  for (r = 0; r < 8; r++) {
    row = [];
    for (c = 0; c < 8; c++) {
      row.push('');
    }
    board.push(row);
  }
}

function initStandardBoard() {
  board = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

function selectPiece(p) {
  selectedPiece = p;
}

function clearBoard() {
  initEmptyBoard();
  draw();
}

function setTurn(t) {
  turn = t;
  draw();
}

	function doneSetup() {
  setupMode = false;
  puzzleCompleted = false;
  solutionMode = false;
  solutionIndex = 0;

  initialBoard = cloneBoard(board);
  initialTurn = turn;

  moveHistory = [cloneBoard(board)];
  historyIndex = 0;

  selected = null;
  lastMove = null;

  draw();
}

function backToSetup() {
  setupMode = true;
  selected = null;
  solutionMode = false;
  draw();
}

function flipBoard() {
  flipped = !flipped;
  draw();
}

function isWhitePiece(p) {
  if (!p) return false;
  return p === p.toUpperCase();
}

function parseSquare(s) {
  return {
    c: s.charCodeAt(0) - 97,
    r: 8 - parseInt(s.charAt(1), 10)
  };
}

function sameColor(a,b){
  if(!a || !b) return false;
  return isWhitePiece(a) === isWhitePiece(b);
}

function castle(side){

  var row = (turn==='white') ? 7 : 0;

  if(side==='king'){
    board[row][6] = board[row][4];
    board[row][4] = '';
    board[row][5] = board[row][7];
    board[row][7] = '';
  } else {
    board[row][2] = board[row][4];
    board[row][4] = '';
    board[row][3] = board[row][0];
    board[row][0] = '';
  }

  turn = (turn==='white') ? 'black' : 'white';
}


function isBasicLegalMove(from,to){

  var p = board[from.r][from.c];
  if(!p) return false;

  if(sameColor(p, board[to.r][to.c])) return false;

  var dr = to.r - from.r;
  var dc = to.c - from.c;
  var adr = Math.abs(dr);
  var adc = Math.abs(dc);

  var piece = p.toLowerCase();

  if(piece === 'p'){
    var dir = isWhitePiece(p) ? -1 : 1;

    if(dc===0 && dr===dir && !board[to.r][to.c]) return true;

    if(adc===1 && dr===dir && board[to.r][to.c]) return true;

    return false;
  }

  if(piece === 'n'){
    return (adr===2 && adc===1) || (adr===1 && adc===2);
  }

  if(piece === 'k'){
    return adr<=1 && adc<=1;
  }

  if(piece === 'b'){
    return adr===adc;
  }

  if(piece === 'r'){
    return dr===0 || dc===0;
  }

  if(piece === 'q'){
    return adr===adc || dr===0 || dc===0;
  }

  return false;
}

function getLegalMoves(from){

  var out = [];
  var r,c;

  for(r=0;r<8;r++){
    for(c=0;c<8;c++){
      if(isBasicLegalMove(from,{r:r,c:c})){
        out.push({r:r,c:c});
      }
    }
  }

  return out;
}
	
function draw() {

  var html = '<table>';
  var vr, vc, r, c, cls, p;
  var legalMoves = [];
  var m;

  if (selected) {
    legalMoves = getLegalMoves(selected);
  }

  for (vr = 0; vr < 8; vr++) {

    html += '<tr>';

    for (vc = 0; vc < 8; vc++) {

      r = flipped ? (7 - vr) : vr;
      c = flipped ? (7 - vc) : vc;

      cls = ((r + c) % 2) ? 'dark' : 'light';

      if (selected && selected.r === r && selected.c === c) {
        cls += ' selected';
      }

      if (lastMove) {
        if (lastMove.from.r === r && lastMove.from.c === c) {
          cls += ' lastfrom';
        }
        if (lastMove.to.r === r && lastMove.to.c === c) {
          cls += ' lastto';
        }
      }

      for (m = 0; m < legalMoves.length; m++) {
        if (
          legalMoves[m].r === r &&
          legalMoves[m].c === c
        ) {
          cls += ' move';
          break;
        }
      }

      html += '<td class="' + cls + '" onclick="handleTap(' + r + ',' + c + ')">';

      p = board[r][c];

      if (p) {
        if (isWhitePiece(p)) {
          html += pieces[p];
        } else {
          html += pieces[p];
        }
      }

      html += '</td>';
    }

    html += '</tr>';
  }

  html += '</table>';

  document.getElementById('board').innerHTML = html;

  var msg = '';

  if (setupMode) {
    msg = 'Setup Mode';
  }
  else if (puzzleCompleted) {
    msg = 'Puzzle Completed!';
  }
  else {
    msg = (turn === 'white' ? 'White' : 'Black') + ' to play';

    if (puzzleGoal) {
      msg += ' | ' + puzzleGoal;
    }
  }

  document.getElementById('info').innerHTML = msg;
}

function handleTap(r,c){

  if(setupMode){
    board[r][c]=selectedPiece;
    draw();
    return;
  }

  if(solutionMode){
    playSolutionMove();
    return;
  }

  if(!selected){

    if(!board[r][c]) return;

    if(turn==='white' && !isWhitePiece(board[r][c])) return;
    if(turn==='black' && isWhitePiece(board[r][c])) return;

    selected={r:r,c:c};
    draw();
    return;
  }

  if(selected.r===r && selected.c===c){
    selected=null;
    draw();
    return;
  }

  if(!isBasicLegalMove(selected,{r:r,c:c})){
    selected=null;
    draw();
    return;
  }

  attemptMove(selected,{r:r,c:c});
  selected=null;
  draw();
}

function makeMove(from, to) {

  moveHistory.push(cloneBoard(board));
  historyIndex++;

  board[to.r][to.c] = board[from.r][from.c];
  board[from.r][from.c] = '';

  lastMove = {
    from: { r:from.r, c:from.c },
    to: { r:to.r, c:to.c }
  };

  turn = (turn === 'white') ? 'black' : 'white';
}

function attemptMove(from, to) {

  makeMove(from, to);

  if (
    solutionMoves.length > 0 &&
    solutionIndex < solutionMoves.length
  ) {

    var expected = solutionMoves[solutionIndex];
    var ef = parseSquare(expected.substring(0,2));
    var et = parseSquare(expected.substring(2,4));

    if (
      from.r === ef.r &&
      from.c === ef.c &&
      to.r === et.r &&
      to.c === et.c
    ) {
      solutionIndex++;

      if (solutionIndex < solutionMoves.length) {

        var reply = solutionMoves[solutionIndex];
        var rf = parseSquare(reply.substring(0,2));
        var rt = parseSquare(reply.substring(2,4));

        makeMove(rf, rt);
        solutionIndex++;
      }

      if (solutionIndex >= solutionMoves.length) {
        puzzleCompleted = true;
      }
    }
  }
}

function prevMove() {

  if (historyIndex <= 0) return;

  historyIndex--;
  board = cloneBoard(moveHistory[historyIndex]);
  draw();
}

function nextMove() {

  if (solutionIndex >= solutionMoves.length) return;

  var mv = solutionMoves[solutionIndex];
  var from = parseSquare(mv.substring(0,2));
  var to = parseSquare(mv.substring(2,4));

  makeMove(from, to);
  solutionIndex++;

  if (solutionIndex >= solutionMoves.length) {
    puzzleCompleted = true;
  }

  draw();
}

function resetPuzzle() {

  if (!initialBoard) return;

  board = cloneBoard(initialBoard);
  turn = initialTurn;

  selected = null;
  solutionIndex = 0;
  solutionMode = false;
  puzzleCompleted = false;

  moveHistory = [cloneBoard(board)];
  historyIndex = 0;

  lastMove = null;

  draw();
}

function startSolutionMode() {

  solutionMode = true;

  function autoStep() {

    if (!solutionMode) return;

    if (solutionIndex >= solutionMoves.length) {
      solutionMode = false;
      puzzleCompleted = true;
      draw();
      return;
    }

    nextMove();

    setTimeout(autoStep, 600);
  }

  autoStep();
}

function playSolutionMove() {

  if (solutionIndex >= solutionMoves.length) {
    solutionMode = false;
    return;
  }

  nextMove();
}

function isPathClear(from,to){

  var dr = to.r - from.r;
  var dc = to.c - from.c;

  var stepR = dr===0 ? 0 : (dr>0 ? 1 : -1);
  var stepC = dc===0 ? 0 : (dc>0 ? 1 : -1);

  var r = from.r + stepR;
  var c = from.c + stepC;

  while(r !== to.r || c !== to.c){
    if(board[r][c]) return false;
    r += stepR;
    c += stepC;
  }

  return true;
}

function isValidMoveStrict(from,to){

  if(
    from.r===to.r &&
    from.c===to.c
  ){
    return false;
  }

  var piece = board[from.r][from.c];
  if(!piece) return false;

  var target = board[to.r][to.c];

  if(
    target &&
    isWhitePiece(piece)===isWhitePiece(target)
  ){
    return false;
  }

  var dr = to.r - from.r;
  var dc = to.c - from.c;

  var adr = Math.abs(dr);
  var adc = Math.abs(dc);

  var p = piece.toLowerCase();

  if(p==='p'){

    var dir = (piece==='P') ? -1 : 1;
    var startRow = (piece==='P') ? 6 : 1;

    // forward 1
    if(
      dc===0 &&
      dr===dir &&
      !target
    ){
      return true;
    }

    // forward 2
    if(
      dc===0 &&
      dr===2*dir &&
      from.r===startRow &&
      !target &&
      !board[from.r + dir][from.c]
    ){
      return true;
    }

    // capture
    if(
      adc===1 &&
      dr===dir &&
      target
    ){
      return true;
    }

    // en passant
    if(
      adc===1 &&
      dr===dir &&
      !target &&
      enPassant &&
      enPassant.r===to.r &&
      enPassant.c===to.c
    ){
      return true;
    }

    return false;
  }

  if(p==='n'){
    return (
      (adr===2 && adc===1) ||
      (adr===1 && adc===2)
    );
  }

  if(p==='b'){
    return (
      adr===adc &&
      isPathClear(from,to)
    );
  }

  if(p==='r'){
    return (
      (dr===0 || dc===0) &&
      isPathClear(from,to)
    );
  }

  if(p==='q'){
    return (
      (
        adr===adc ||
        dr===0 ||
        dc===0
      ) &&
      isPathClear(from,to)
    );
  }

  if(p==='k'){
    return (
      adr<=1 &&
      adc<=1
    );
  }

  return false;
}
	
function applyPGNMove(move){

  if(move === 'O-O'){
    castle('king');
    return;
  }

  if(move === 'O-O-O'){
    castle('queen');
    return;
  }

  var pieceType = 'p';
  var fromFile = null;
  var fromRank = null;

  if(/[RNBQK]/.test(move.charAt(0))){
    pieceType = move.charAt(0).toLowerCase();
    move = move.slice(1);
  }

  var isCapture = move.indexOf('x') >= 0;
  move = move.replace('x','');

  var pawnCaptureFile = null;

  if(pieceType === 'p' && isCapture){
    pawnCaptureFile = move.charAt(0);
  }

  var promotionPiece = null;

  if(move.indexOf('=') >= 0){
    var pp = move.split('=');
    move = pp[0];
    promotionPiece = pp[1].toLowerCase();
  }

  if(pieceType !== 'p' && move.length > 2){

    var first = move.charAt(0);

    if(/[a-h]/.test(first)){
      fromFile = first;
      move = move.slice(1);
    }
    else if(/[1-8]/.test(first)){
      fromRank = first;
      move = move.slice(1);
    }
  }

  var target = move.slice(-2);

  var to = {
    r: 8 - parseInt(target.charAt(1),10),
    c: target.charCodeAt(0) - 97
  };

  var candidates = [];
  var r,c,p;

  for(r=0;r<8;r++){
    for(c=0;c<8;c++){

      p = board[r][c];
      if(!p) continue;

      if(turn==='white' && p!==p.toUpperCase()) continue;
      if(turn==='black' && p!==p.toLowerCase()) continue;

      if(p.toLowerCase() !== pieceType) continue;

      if(isValidMoveStrict({r:r,c:c}, to)){
        candidates.push({r:r,c:c});
      }
    }
  }

  if(fromFile){
    candidates = candidates.filter(function(x){
      return x.c === (fromFile.charCodeAt(0)-97);
    });
  }

  if(fromRank){
    candidates = candidates.filter(function(x){
      return x.r === (8 - parseInt(fromRank,10));
    });
  }

  if(pawnCaptureFile){
    candidates = candidates.filter(function(x){
      return x.c === (pawnCaptureFile.charCodeAt(0)-97);
    });
  }

  if(candidates.length===0){
    return;
  }

  var from = candidates[0];
  var piece = board[from.r][from.c];

  if(promotionPiece){
    piece = (turn==='white')
      ? promotionPiece.toUpperCase()
      : promotionPiece;
  }

  if(piece.toLowerCase()==='p' && isCapture && !board[to.r][to.c]){
    var dir = (piece==='P') ? 1 : -1;
    board[to.r + dir][to.c] = '';
  }

  board[to.r][to.c] = piece;
  board[from.r][from.c] = '';

  turn = (turn==='white') ? 'black' : 'white';
}

function loadNextPuzzle() {

  document.getElementById('info').innerHTML =
    'Fetching random Lichess puzzle...';

  var xhr = new XMLHttpRequest();

  xhr.onreadystatechange = function() {

    if (xhr.readyState !== 4) return;

    if (xhr.status !== 200) {
      document.getElementById('info').innerHTML =
        'Random puzzle fetch failed';
      return;
    }

    try {

      var data = JSON.parse(xhr.responseText);
      var goal = 'To win';

      if (
        data.puzzle &&
        data.puzzle.themes &&
        data.puzzle.solution &&
        data.puzzle.themes.indexOf('mate') >= 0
      ) {
        goal = 'Mate in ' +
          Math.ceil(data.puzzle.solution.length / 2);
      }

      var pgn = data.game.pgn || '';

      pgn = pgn.replace(/\[[^\]]*\]/g, '');
      pgn = pgn.replace(/\d+\./g, '');
      pgn = pgn.replace(/1-0|0-1|1\/2-1\/2|\*/g, '');
      pgn = pgn.replace(/^\s+|\s+$/g, '');

      var compact =
        goal + '|' +
        pgn + '|' +
        data.puzzle.solution.join(' ');

      document.getElementById('pgnInput').value = compact;

      loadPGN();

    } catch(e) {
      document.getElementById('info').innerHTML =
        'Puzzle parse error';
    }
  };

  xhr.open(
    'GET',
    'https://lichess.org/api/puzzle/next',
    true
  );

  xhr.send();
}

function loadPGN() {

  var raw = document.getElementById('pgnInput').value;
  if (!raw) return;

  raw = raw.replace(/^\s+|\s+$/g, '');

  var parts = raw.split('|');

  puzzleGoal = parts[0] || 'To win';

  var history = parts[1] || '';
  var solution = parts[2] || '';

  initStandardBoard();
  turn = 'white';

  var moves = history
  .replace(/\d+\./g,'')
  .replace(/\+/g,'')
  .replace(/#/g,'')
  .replace(/^\s+|\s+$/g,'')
  .split(/\s+/);
  var i;

  for (i = 0; i < moves.length; i++) {
    applyPGNMove(moves[i]);
  }

  solutionMoves = [];

  if (solution.replace(/\s+/g,'')) {
    solutionMoves = solution.split(/\s+/);
  }

  solutionIndex = 0;
  solutionMode = false;
  puzzleCompleted = false;
  setupMode = false;

  initialBoard = cloneBoard(board);
  initialTurn = turn;

  moveHistory = [cloneBoard(board)];
  historyIndex = 0;

  lastMove = null;
  selected = null;

  draw();
}
