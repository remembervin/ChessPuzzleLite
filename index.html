<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vins Kobo Chess Puzzle Lite</title>

<style>
body{
  max-width:720px;
  margin:0 auto;
  padding:0;
  font-family:sans-serif;
  text-align:center;
  background:#fff;
  color:#000;
}

#board table{
  border-collapse:collapse;
  margin:0 auto;
  border:2px solid #000;
}

#board td{
  width:42px;
  height:42px;
  padding:0;
  text-align:center;
  vertical-align:middle;
  border:1px solid #666;
  cursor:pointer;
}

.light{background:#eee;}
.dark{background:#aaa;}

.lastmove{
  box-shadow: inset 0 0 0 2px #444;
}

.lastmoveTo{
  box-shadow: inset 0 0 0 3px #000;
}

.checkmateGlow{
  box-shadow: inset 0 0 10px 4px #000;
}

.checkingPiece{
  outline:2px dotted #000;
}

.selected{
  outline:2px solid #000;
}

.move{
  box-shadow: inset 0 0 0 1px #444;
}

.capture{
  outline:2px solid #000;
}

button{
  margin:4px;
  font-size:16px;
}

#promotion{
  display:none;
}
</style>
</head>

<body>

<h2>Vins Kobo Chess Puzzle Lite</h2>
<div id="info">Setup Mode</div>
<div id="board"></div>

<div style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
">

  <div style="display:flex; gap:6px;">
    <button onclick="loadPuzzleFile()">Load Puzzle</button>
    <button onclick="loadNextPuzzle()">Next</button>
  </div>

  <div style="display:flex; gap:6px;">
    <button onclick="prevMove()">◀</button>
    <button onclick="nextMove()">▶</button>
  </div>

  <div style="display:flex; gap:6px;">
    <button onclick="resetPuzzle()">Reset</button>
    <button onclick="startSolutionMode()">💡</button>
  </div>

</div>

<div id="promotion"></div>

<div style="
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:10px;
  margin:10px 0;
">

  <div style="
    display:grid;
    grid-template-columns: repeat(6, 40px);
    gap:6px;
  ">
    <button onclick="selectPiece('K')">WK</button>
    <button onclick="selectPiece('Q')">WQ</button>
    <button onclick="selectPiece('R')">WR</button>
    <button onclick="selectPiece('B')">WB</button>
    <button onclick="selectPiece('N')">WN</button>
    <button onclick="selectPiece('P')">WP</button>

    <button onclick="selectPiece('k')">BK</button>
    <button onclick="selectPiece('q')">BQ</button>
    <button onclick="selectPiece('r')">BR</button>
    <button onclick="selectPiece('b')">BB</button>
    <button onclick="selectPiece('n')">BN</button>
    <button onclick="selectPiece('p')">BP</button>
  </div>

  <div style="
    display:grid;
    grid-template-columns:auto auto;
    gap:6px;
  ">
    <button onclick="clearSquare()">Clear</button>
    <button onclick="clearBoard()">Clear Board</button>
    <button onclick="setTurn('white')">WTP</button>
    <button onclick="setTurn('black')">BTP</button>
  </div>

  <div style="display:flex;">
    <button style="
      padding:6px 4px;
      font-size:14px;
      height:100%;
    " onclick="doneSetup()">GO</button>
  </div>

</div>

<div style="margin-top:20px; padding-top:10px; border-top:1px solid #aaa;">
  <input id="pgnInput" placeholder="Paste PGN here" style="width:80%;">
  <br>
  <button onclick="loadPGN()">Load PGN Puzzle</button>
</div>

<div id="playControls" style="display:none;">
  <button onclick="flipPieces()">Flip</button>
  <span style="margin-left:20px;">
    <button onclick="backToSetup()">Edit Puzzle</button>
  </span>
</div>

<script>

const pieces = {

K:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><line x1="30" y1="4" x2="30" y2="17" stroke-width="3"/><line x1="22" y1="10" x2="38" y2="10" stroke-width="3"/><path d="M20 20 L40 20 L37 30 L43 48 L17 48 L23 30 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

k:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><line x1="30" y1="4" x2="30" y2="17" stroke-width="3"/><line x1="22" y1="10" x2="38" y2="10" stroke-width="3"/><path d="M20 20 L40 20 L37 30 L43 48 L17 48 L23 30 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

Q:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><path d="M17 18 L43 18 L40 32 L20 32 Z"/><rect x="19" y="34" width="22" height="12"/><rect x="14" y="50" width="32" height="4"/><line x1="18" y1="18" x2="14" y2="10"/><line x1="24" y1="18" x2="22" y2="8"/><line x1="30" y1="18" x2="30" y2="6"/><line x1="36" y1="18" x2="38" y2="8"/><line x1="42" y1="18" x2="46" y2="10"/><circle cx="14" cy="10" r="2.5"/><circle cx="22" cy="8" r="2.5"/><circle cx="30" cy="6" r="2.5"/><circle cx="38" cy="8" r="2.5"/><circle cx="46" cy="10" r="2.5"/></g></svg>',

q:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><path d="M17 18 L43 18 L40 32 L20 32 Z"/><rect x="19" y="34" width="22" height="12"/><rect x="14" y="50" width="32" height="4"/><line x1="18" y1="18" x2="14" y2="10"/><line x1="24" y1="18" x2="22" y2="8"/><line x1="30" y1="18" x2="30" y2="6"/><line x1="36" y1="18" x2="38" y2="8"/><line x1="42" y1="18" x2="46" y2="10"/><circle cx="14" cy="10" r="2.5"/><circle cx="22" cy="8" r="2.5"/><circle cx="30" cy="6" r="2.5"/><circle cx="38" cy="8" r="2.5"/><circle cx="46" cy="10" r="2.5"/></g></svg>',

	R:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><rect x="16" y="12" width="8" height="6"/><rect x="26" y="12" width="8" height="6"/><rect x="36" y="12" width="8" height="6"/><rect x="16" y="18" width="28" height="6"/><rect x="20" y="24" width="20" height="22"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

r:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><rect x="16" y="12" width="8" height="6"/><rect x="26" y="12" width="8" height="6"/><rect x="36" y="12" width="8" height="6"/><rect x="16" y="18" width="28" height="6"/><rect x="20" y="24" width="20" height="22"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

B:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><path d="M30 6 L34 11 C38 15,38 22,34 27 L36 31 L24 31 L26 27 C22 22,22 15,26 11 Z"/><line x1="27" y1="14" x2="33" y2="22"/><path d="M22 33 L38 33 L42 47 L18 47 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

b:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><path d="M30 6 L34 11 C38 15,38 22,34 27 L36 31 L24 31 L26 27 C22 22,22 15,26 11 Z"/><line x1="27" y1="14" x2="33" y2="22" stroke="white"/><path d="M22 33 L38 33 L42 47 L18 47 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

N:'<svg viewBox="0 0 60 60" width="32" height="32"><g transform="translate(6,7) scale(1.48)" fill="white" stroke="black" stroke-width="1.15"><path d="M21.595 24.502c-0.562-0.617-0.354-2.674-0.354-2.674s1.107-4.826 1.711-5.932c0.604-1.105 0.62-4.278 0.62-4.278s-0.118-1.963-0.974-4.384c-0.856-2.42-3.852-4.44-5.872-4.766C16.519 1.333 14.734 0 14.734 0s0.295 2.439-0.03 2.483c-0.325 0.044-1.682 0.443-1.682 0.443l0.31 1.003c-1.756 0.518-2.458 1.019-2.458 1.019s-0.05 0.089-0.375 0.753S6.294 9.463 6.111 9.67c-0.183 0.207-0.078 0.604-0.078 0.604s-0.062 0.812-0.106 0.856c-0.044 0.045-0.163 0.664 0.051 0.93c0.214 0.267 0.376 0.59 0.803 0.944c0.428 0.354 0.546 0.118 0.546 0.118s0.036 0.135 1.225 0.321c1.461 0.013 1.962-1.059 1.962-1.059s0.428-0.752 1.564-0.531c2.272 1.181 3.815 0.292 3.815 0.292s-1.849 1.532-4.603 5.564c-2.754 4.031-0.787 6.791-0.787 6.791z"/><rect x="6.5" y="27.2" width="18.5" height="4.2"/></g></svg>',

n:'<svg viewBox="0 0 60 60" width="32" height="32"><g transform="translate(6,7) scale(1.48)" fill="black" stroke="black" stroke-width="1.15"><path d="M21.595 24.502c-0.562-0.617-0.354-2.674-0.354-2.674s1.107-4.826 1.711-5.932c0.604-1.105 0.62-4.278 0.62-4.278s-0.118-1.963-0.974-4.384c-0.856-2.42-3.852-4.44-5.872-4.766C16.519 1.333 14.734 0 14.734 0s0.295 2.439-0.03 2.483c-0.325 0.044-1.682 0.443-1.682 0.443l0.31 1.003c-1.756 0.518-2.458 1.019-2.458 1.019s-0.05 0.089-0.375 0.753S6.294 9.463 6.111 9.67c-0.183 0.207-0.078 0.604-0.078 0.604s-0.062 0.812-0.106 0.856c-0.044 0.045-0.163 0.664 0.051 0.93c0.214 0.267 0.376 0.59 0.803 0.944c0.428 0.354 0.546 0.118 0.546 0.118s0.036 0.135 1.225 0.321c1.461 0.013 1.962-1.059 1.962-1.059s0.428-0.752 1.564-0.531c2.272 1.181 3.815 0.292 3.815 0.292s-1.849 1.532-4.603 5.564c-2.754 4.031-0.787 6.791-0.787 6.791z"/><rect x="6.5" y="27.2" width="18.5" height="4.2"/></g></svg>',

P:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="white" stroke="black" stroke-width="2"><circle cx="30" cy="15" r="7"/><path d="M24 24 L36 24 L38 29 L36 33 L40 46 L20 46 L24 33 L22 29 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>',

p:'<svg viewBox="0 0 60 60" width="32" height="32"><g fill="black" stroke="black" stroke-width="2"><circle cx="30" cy="15" r="7"/><path d="M24 24 L36 24 L38 29 L36 33 L40 46 L20 46 L24 33 L22 29 Z"/><rect x="14" y="50" width="32" height="4"/></g></svg>'
};

let initialBoard = null;
let initialTurn = 'white';
let board=[], selected=null;
let setupMode=true;
let selectedPiece='';
let turn='white', flipped=false;
let puzzleGoal = "";
let enPassant=null, pendingPromotion=null;
let gameOver=false;
let solutionMoves = [];
let solutionIndex = 0;
let solutionMode = false;
let puzzleStart = false;
let puzzleList = [];
let puzzleIndex = 0;
let lastMove = null;
let checkmateSquare = null;
let checkingPieceSquare = null;
let moveHistory = [];
let historyIndex = -1;
let puzzleCompleted = false;
let moved = {};

function initEmptyBoard(){
  board=[];
  for(let r=0;r<8;r++) board.push(['','','','','','','','']);
}

function initStandardBoard(){
  board=[
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

function cloneBoard(b){
  return JSON.parse(JSON.stringify(b));
}

function draw(){

  const el=document.getElementById('board');
  el.innerHTML='';

  let legalMoves=[];
  if(!setupMode && selected){
    legalMoves=getLegalMoves(selected);
  }

  const tbl=document.createElement('table');

  for(let r=0;r<8;r++){

    const tr=document.createElement('tr');

    for(let c=0;c<8;c++){

      const rr = flipped ? 7-r : r;
      const cc = flipped ? 7-c : c;

      const td=document.createElement('td');
      td.className=((rr+cc)%2)?'dark':'light';

      const piece=board[rr][cc];

      if(piece){
        td.innerHTML=pieces[piece];
      }

      if(selected && selected.r===rr && selected.c===cc){
        td.className+=' selected';
      }

      if(lastMove){
        if(lastMove.from.r===rr && lastMove.from.c===cc){
          td.className+=' lastmove';
        }
        if(lastMove.to.r===rr && lastMove.to.c===cc){
          td.className+=' lastmoveTo';
        }
      }

      if(checkmateSquare && checkmateSquare.r===rr && checkmateSquare.c===cc){
        td.className+=' checkmateGlow';
      }

      if(checkingPieceSquare && checkingPieceSquare.r===rr && checkingPieceSquare.c===cc){
        td.className+=' checkingPiece';
      }

      for(let m of legalMoves){
        if(m.r===rr && m.c===cc){
          if(isCaptureMove(selected,m)) td.className+=' capture';
          else td.className+=' move';
        }
      }

      td.onclick=(()=>handleTap(rr,cc));
      tr.appendChild(td);
    }

    tbl.appendChild(tr);
  }

  el.appendChild(tbl);

  let sideText=(turn==='white')?"White to play":"Black to play";
  let msg;

  if(puzzleCompleted){
    msg="Puzzle Completed!";
  }
  else if(setupMode){
    msg="Load Puzzle or Setup board manually !";
  }
  else if(initialBoard){
    if(puzzleStart){
      if(puzzleGoal){
        msg=sideText+" | "+puzzleGoal;
      } else {
        msg=sideText+" & win";
      }
    } else {
      msg=sideText;
    }
  } else {
    msg=sideText;
  }

  document.getElementById('info').textContent=msg;
}

	function loadPuzzleFile(){

  var xhr = new XMLHttpRequest();

  xhr.onreadystatechange = function(){
    if(xhr.readyState==4 && xhr.status==200){
      puzzleList = xhr.responseText.split("\n").filter(function(x){ return x.trim(); });
      puzzleIndex = 0;
      loadNextPuzzle();
    }
  };

  xhr.open("GET", "puzzles.txt", true);
  xhr.send();
}

function loadNextPuzzle(){
  if(puzzleList.length===0) return;
  const raw = puzzleList[puzzleIndex];
  puzzleIndex = (puzzleIndex + 1) % puzzleList.length;
  document.getElementById('pgnInput').value = raw;
  loadPGN();
}

function loadPGN(){

  lastMove = null;
  checkmateSquare = null;
  checkingPieceSquare = null;
  puzzleCompleted = false;
  puzzleStart = true;
  moved = {};

  const raw = document.getElementById('pgnInput').value.trim();
  if(!raw) return;

  let parts = raw.split('|');

  let pgn = raw;
  solutionMoves = [];
  solutionIndex = 0;

  if(parts.length >= 2){
    puzzleGoal = parts[0];
    pgn = parts[1];
  }

  if(parts.length >= 3){
    solutionMoves = parts[2].trim().split(' ');
  }

  initStandardBoard();
  turn = 'white';

  const moves = pgn
    .replace(/\d+\./g,'')
    .replace(/\+/g,'')
    .replace(/#/g,'')
    .trim()
    .split(/\s+/);

  for(let move of moves){
    applyPGNMove(move);
  }

  solutionMode = false;
  solutionIndex = 0;
  selected = null;
  pendingPromotion = null;
  enPassant = null;
  gameOver = false;
  setupMode = false;

  document.getElementById('playControls').style.display='block';

  initialBoard = JSON.parse(JSON.stringify(board));
  initialTurn = turn;

  draw();

  moveHistory = [JSON.parse(JSON.stringify(board))];
  historyIndex = 0;
}

function castle(side){

  const row = (turn==='white') ? 7 : 0;

  if(side==='king'){
    board[row][6] = board[row][4];
    board[row][4] = '';
    board[row][5] = board[row][7];
    board[row][7] = '';
  } else {
    board[row][2] = board[row][4];
    board[row][4] = '';
    board[row][3] = board[row][0];
    board[row][0] = '';
  }

  turn = (turn==='white')?'black':'white';
}

function applyPGNMove(move){

  if(move === 'O-O'){ castle('king'); return; }
  if(move === 'O-O-O'){ castle('queen'); return; }

  let pieceType = 'p';
  let fromFile = null;
  let fromRank = null;

  if(/[RNBQK]/.test(move[0])){
    pieceType = move[0].toLowerCase();
    move = move.slice(1);
  }

  const isCapture = move.includes('x');
  move = move.replace('x','');

  let pawnCaptureFile = null;

  if(pieceType === 'p' && isCapture){
    pawnCaptureFile = move[0];
  }

  let promotionPiece = null;

  if(move.includes('=')){
    const parts = move.split('=');
    move = parts[0];
    promotionPiece = parts[1].toLowerCase();
  }

  if(pieceType !== 'p' && move.length > 2){
    const first = move[0];

    if(/[a-h]/.test(first)){
      fromFile = first;
      move = move.slice(1);
    }
    else if(/[1-8]/.test(first)){
      fromRank = first;
      move = move.slice(1);
    }
  }

  const target = move.slice(-2);

  const to = {
    r: 8 - parseInt(target[1]),
    c: target.charCodeAt(0) - 97
  };

  let candidates = [];

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const p = board[r][c];
      if(!p) continue;

      if(turn==='white' && p!==p.toUpperCase()) continue;
      if(turn==='black' && p!==p.toLowerCase()) continue;
      if(p.toLowerCase() !== pieceType) continue;

      if(isValidMoveStrict({r,c}, to)){
        candidates.push({r,c});
      }
    }
  }

  if(fromFile){
    candidates = candidates.filter(function(c){
      return c.c === (fromFile.charCodeAt(0)-97);
    });
  }

  if(fromRank){
    candidates = candidates.filter(function(c){
      return c.r === (8 - parseInt(fromRank));
    });
  }

  if(pawnCaptureFile){
    candidates = candidates.filter(function(c){
      return c.c === (pawnCaptureFile.charCodeAt(0)-97);
    });
  }

  if(candidates.length===0) return;

  const from = candidates[0];

  let piece = board[from.r][from.c];

  if(promotionPiece){
    piece = (turn==='white') ? promotionPiece.toUpperCase() : promotionPiece;
  }

  if(piece.toLowerCase()==='p' && isCapture && !board[to.r][to.c]){
    const dir = (piece==='P') ? 1 : -1;
    board[to.r + dir][to.c] = '';
  }

  board[to.r][to.c] = piece;
  board[from.r][from.c] = '';

  enPassant = null;

  if(piece.toLowerCase()==='p' && Math.abs(to.r - from.r)===2){
    enPassant = {
      r: (from.r + to.r)/2,
      c: from.c
    };
  }

  turn = (turn==='white') ? 'black' : 'white';
}

initEmptyBoard();
draw();

</script>
</body>
</html>
